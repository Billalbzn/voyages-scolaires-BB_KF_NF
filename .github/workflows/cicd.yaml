name: CI/CD

on:
  push:
    branches: [main]

jobs:
  # ---------------------------------------------------------------------------
  # Job 1 : tests — s'exécute sur chaque push. Si les tests échouent,
  # le job build-push ne démarre pas : la prod est protégée.
  # ---------------------------------------------------------------------------
  tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: www
    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: pdo_mysql, mbstring, gd, zip

      - run: composer install --no-interaction --no-progress

      - run: cp .env.example .env && php artisan key:generate

      - run: php artisan test

  # ---------------------------------------------------------------------------
  # Job 2 : build & push — ne s'exécute QUE si les tests sont verts (needs).
  # Construit l'image multi-arch et la publie sur GHCR (2 tags : latest + sha).
  # ---------------------------------------------------------------------------
  build-push:
    needs: tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Le chemin GHCR doit être TOUT en minuscules -> on force le lowercase.
      - name: Préparer le nom de l'image (minuscules)
        id: image
        run: echo "repo=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/php/Dockerfile.prod
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/${{ steps.image.outputs.repo }}:latest
            ghcr.io/${{ steps.image.outputs.repo }}:${{ github.sha }}
