apiVersion: batch/v1
kind: CronJob
metadata:
  name: mariadb-backup
spec:
  schedule: "0 3 * * *"          # tous les jours à 3h du matin
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: dump
              image: mariadb:10.11
              command: ["/bin/sh", "-c"]
              args:
                - >
                  mariadb-dump -h mariadb
                  -u root -p"$MYSQL_ROOT_PASSWORD"
                  voyages_scolaires > /backup/dump-$(date +%F).sql
              env:
                - name: MYSQL_ROOT_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: laravel-secrets
                      key: DB_ROOT_PASSWORD
              volumeMounts:
                - name: backup
                  mountPath: /backup
          volumes:
            - name: backup
              persistentVolumeClaim:
                claimName: backup-pvc
# Test immédiat (sans attendre 3h) :
#   kubectl create job test-backup --from=cronjob/mariadb-backup
#   kubectl logs job/test-backup
