# =============================================================================
# MODÈLE de Secret — À COPIER en k8s/secret.yaml puis renseigner les valeurs.
#   cp k8s/secret.example.yaml k8s/secret.yaml
# k8s/secret.yaml est dans .gitignore (ne JAMAIS le committer).
#
# APP_KEY : docker compose exec app php artisan key:generate --show
#           (copier la valeur "base64:..." complète)
# =============================================================================
apiVersion: v1
kind: Secret
metadata:
  name: laravel-secrets
type: Opaque
stringData:
  APP_KEY: "base64:REMPLACER_PAR_LA_CLE_GENEREE"
  DB_USERNAME: "voyages_user"
  DB_PASSWORD: "REMPLACER_MOT_DE_PASSE"
  DB_ROOT_PASSWORD: "REMPLACER_MOT_DE_PASSE_ROOT"
